# .github/workflows/daily-report.yml
# Purpose : Daily report generation via GitHub Actions (fallback to Railway cron).
#           Runs every day at 00:00 UTC (09:00 JST).
#           Can also be triggered manually via workflow_dispatch.
# Note    : Primary runner is Railway cron. This workflow serves as backup
#           and for testing without Railway setup.

name: Daily Report

on:
  schedule:
    - cron: "0 0 * * *"   # UTC 00:00 = JST 09:00
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no LLM call, no push)"
        required: false
        default: "false"
        type: boolean
      skip_commit:
        description: "Skip git commit/push"
        required: false
        default: "false"
        type: boolean

jobs:
  generate-report:
    name: Generate Daily Report
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci --prefix frontend

      - name: Install backend deps
        run: pip install -e "backend[dev]" -q

      - name: Run ops/run.sh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.skip_commit }}" = "true" ]; then
            ARGS="$ARGS --skip-commit"
          fi
          bash ops/run.sh $ARGS

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_id }}
          path: docs/reports/daily/*.md
          retention-days: 30
