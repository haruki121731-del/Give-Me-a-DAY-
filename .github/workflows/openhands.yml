name: OpenHands Issue Resolver

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-fix:
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'fix-me') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@openhands-agent'))
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 1

      - name: Auto-fix via Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          PAT_USERNAME: ${{ secrets.PAT_USERNAME }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.comment.issue_url && github.event.comment.issue_url || '' }}
          ISSUE_TITLE: ${{ github.event.issue.title || '' }}
          ISSUE_BODY: ${{ github.event.issue.body || '' }}
        run: |
          python3 << 'PYEOF'
          import os, json, subprocess, sys
          import urllib.request, urllib.error

          ANTHROPIC_API_KEY = os.environ["ANTHROPIC_API_KEY"]
          PAT_TOKEN = os.environ["PAT_TOKEN"]
          PAT_USERNAME = os.environ.get("PAT_USERNAME", "")
          REPO = os.environ["REPO"]
          ISSUE_NUMBER = os.environ.get("ISSUE_NUMBER", "")
          ISSUE_TITLE = os.environ.get("ISSUE_TITLE", "")
          ISSUE_BODY = os.environ.get("ISSUE_BODY", "")

          if not ISSUE_NUMBER or not ISSUE_TITLE:
              print("No issue info available, skipping")
              sys.exit(0)

          print(f"Fixing issue #{ISSUE_NUMBER}: {ISSUE_TITLE}")

          # ── List repo files (top-level + docs/) ──────────────────────────
          result = subprocess.run(
              ["git", "ls-files", "--", "*.md", "*.sh", "*.py", "*.yml", "*.yaml", "*.json"],
              capture_output=True, text=True
          )
          file_list = [f for f in result.stdout.strip().split("\n") if f][:40]

          # ── Read files likely relevant to the issue ──────────────────────
          keywords = ISSUE_TITLE.lower().split() + ISSUE_BODY.lower().split()[:20]
          relevant = []
          for f in file_list:
              if any(k in f.lower() for k in keywords if len(k) > 3):
                  relevant.append(f)
          if not relevant:
              relevant = [f for f in file_list if "open_loop" in f.lower() or "current_state" in f.lower() or "session" in f.lower()]
          if not relevant:
              relevant = file_list[:5]

          file_contents = {}
          for f in relevant[:6]:
              try:
                  with open(f, "r", encoding="utf-8", errors="replace") as fh:
                      file_contents[f] = fh.read()[:4000]
              except Exception as e:
                  print(f"Warning: could not read {f}: {e}")

          # ── Call Claude ──────────────────────────────────────────────────
          context_parts = [f"File: {k}\n```\n{v}\n```" for k, v in file_contents.items()]
          context = "\n\n".join(context_parts)

          prompt = f"""You are an autonomous code agent. Your job is to fix a GitHub issue by making the minimal necessary file change.

Issue #{ISSUE_NUMBER}: {ISSUE_TITLE}

Issue body:
{ISSUE_BODY[:2000]}

Current file contents (relevant files):
{context}

Instructions:
1. Identify the single file that needs to be changed to resolve this issue.
2. Return ONLY a JSON object with this exact structure:
{{
  "file": "path/to/file.md",
  "content": "complete new file content here",
  "explanation": "one sentence explaining what was changed"
}}
3. Return the COMPLETE new file content (not a diff).
4. If no change is needed or the issue is already resolved, return:
{{"file": null, "content": null, "explanation": "already resolved"}}

Return ONLY the JSON object, no other text."""

          payload = json.dumps({
              "model": "claude-haiku-4-5-20251001",
              "max_tokens": 8192,
              "messages": [{"role": "user", "content": prompt}]
          }).encode("utf-8")

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=payload,
              headers={
                  "x-api-key": ANTHROPIC_API_KEY,
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json",
              },
              method="POST"
          )

          try:
              with urllib.request.urlopen(req, timeout=60) as resp:
                  response = json.loads(resp.read().decode("utf-8"))
          except Exception as e:
              print(f"API error: {e}")
              sys.exit(1)

          text = response["content"][0]["text"].strip()
          # Strip markdown code fence if present
          if text.startswith("```"):
              text = "\n".join(text.split("\n")[1:])
              if text.endswith("```"):
                  text = text[:-3].strip()

          result_data = json.loads(text)
          print(f"Claude says: {result_data.get('explanation','')}")

          if not result_data.get("file") or not result_data.get("content"):
              print("No change needed. Exiting.")
              sys.exit(0)

          target_file = result_data["file"]
          new_content = result_data["content"]

          # ── Write the file and commit ────────────────────────────────────
          os.makedirs(os.path.dirname(target_file) if "/" in target_file else ".", exist_ok=True)
          with open(target_file, "w", encoding="utf-8") as fh:
              fh.write(new_content)

          branch_name = f"fix/issue-{ISSUE_NUMBER}-auto"
          subprocess.run(["git", "config", "user.email", "openhands@all-hands.dev"], check=True)
          subprocess.run(["git", "config", "user.name", "OpenHands"], check=True)
          subprocess.run(["git", "checkout", "-b", branch_name], check=True)
          subprocess.run(["git", "add", target_file], check=True)
          subprocess.run(["git", "commit", "-m", f"fix: issue #{ISSUE_NUMBER} — {result_data['explanation'][:60]}"], check=True)

          # Push using PAT
          remote_url = f"https://{PAT_USERNAME}:{PAT_TOKEN}@github.com/{REPO}.git"
          subprocess.run(["git", "remote", "set-url", "origin", remote_url], check=True)
          subprocess.run(["git", "push", "origin", branch_name], check=True)
          print(f"Pushed branch: {branch_name}")

          # Create PR
          pr_payload = json.dumps({
              "title": f"Fix: Issue #{ISSUE_NUMBER} — {ISSUE_TITLE[:60]}",
              "body": f"Auto-fix for #{ISSUE_NUMBER}\n\n{result_data['explanation']}\n\nCloses #{ISSUE_NUMBER}",
              "head": branch_name,
              "base": "main",
              "draft": False
          }).encode("utf-8")

          pr_req = urllib.request.Request(
              f"https://api.github.com/repos/{REPO}/pulls",
              data=pr_payload,
              headers={
                  "Authorization": f"token {PAT_TOKEN}",
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json"
              },
              method="POST"
          )
          with urllib.request.urlopen(pr_req, timeout=30) as resp:
              pr_data = json.loads(resp.read().decode("utf-8"))
          print(f"PR created: #{pr_data['number']} {pr_data['html_url']}")

          # Write result for comment step
          with open("/tmp/fix_result.json", "w") as f:
              json.dump({
                  "pr_number": pr_data["number"],
                  "pr_url": pr_data["html_url"],
                  "explanation": result_data["explanation"]
              }, f)
          PYEOF

      - name: Comment on issue
        uses: actions/github-script@v7
        if: always()
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const fs = require('fs');
            const issueNumber = parseInt(process.env.ISSUE_NUMBER);
            if (!issueNumber) return;
            let body = '⚠️ Auto-fix スクリプトが実行されましたが、PR は作成されませんでした。ログを確認してください。';
            if (fs.existsSync('/tmp/fix_result.json')) {
              const r = JSON.parse(fs.readFileSync('/tmp/fix_result.json', 'utf8'));
              body = `✅ 修正完了。PR #${r.pr_number} を作成しました: ${r.pr_url}\n\n> ${r.explanation}`;
            }
            await github.rest.issues.createComment({
              issue_number: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            }).catch(console.error);
            await github.rest.issues.removeLabel({
              issue_number: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'fix-me'
            }).catch(() => {});
